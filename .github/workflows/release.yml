name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'Release ')
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Parse commit message
        id: parse
        shell: bash
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"
          # "Release vX.X.X" (all) or "Release <Name> vX.X.X" (single)
          if echo "$MESSAGE" | grep -qE '^Release v[0-9]'; then
            VERSION=$(echo "$MESSAGE" | sed -n 's/Release v\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "name=" >> "$GITHUB_OUTPUT"
            echo "mode=all" >> "$GITHUB_OUTPUT"
          else
            PACKAGE=$(echo "$MESSAGE" | sed -n 's/Release \(.*\) v[0-9].*/\1/p')
            VERSION=$(echo "$MESSAGE" | sed -n 's/.*v\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
            TAG_NAME=$(echo "$PACKAGE" | tr '[:upper:]' '[:lower:]')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG_NAME}-v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "name=$PACKAGE" >> "$GITHUB_OUTPUT"
            echo "mode=single" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release body
        shell: bash
        run: |
          MODE="${{ steps.parse.outputs.mode }}"
          NAME="${{ steps.parse.outputs.name }}"
          VERSION="${{ steps.parse.outputs.version }}"

          # Extract a single version's section from a RELEASENOTES file.
          # Matches "## vX.Y.Z" (followed by space, paren, or EOL) and emits
          # everything up to (but not including) the next "## vN..." heading.
          # Strips a leading UTF-8 BOM and any trailing "---" dividers or blank lines.
          extract_version() {
            local file="$1" ver="$2"
            awk -v ver="v$ver" '
              BEGIN { found = 0 }
              { sub(/^\xef\xbb\xbf/, "") }
              !found && $0 ~ "^## " ver "([[:space:]]|\\(|$)" { found = 1; print; next }
              found && /^## v[0-9]/ { exit }
              found { print }
            ' "$file" | awk '
              { lines[NR] = $0 }
              END {
                end = NR
                while (end > 0 && (lines[end] ~ /^[[:space:]]*$/ || lines[end] ~ /^---[[:space:]]*$/)) end--
                for (i = 1; i <= end; i++) print lines[i]
              }
            '
          }

          if [ "$MODE" = "all" ]; then
            # Bundled release: concatenate the latest section from each package.
            {
              for f in RELEASENOTES.*.md; do
                TITLE=$(echo "$f" | sed 's/RELEASENOTES\.\(.*\)\.md/\1/')
                # Latest heading in the file (first match of "## vX.Y.Z ...")
                LATEST=$(grep -oE '^## v[0-9]+\.[0-9]+\.[0-9]+' "$f" | head -n 1 | sed 's/^## v//')
                if [ -z "$LATEST" ]; then
                  continue
                fi
                echo "# $TITLE"
                echo ""
                extract_version "$f" "$LATEST"
                echo ""
                echo "---"
                echo ""
              done
            } > RELEASE_BODY.md
          else
            BODY=$(extract_version "RELEASENOTES.${NAME}.md" "$VERSION")
            if [ -z "$BODY" ]; then
              echo "::error::No section for v$VERSION found in RELEASENOTES.${NAME}.md"
              exit 1
            fi
            printf '%s\n' "$BODY" > RELEASE_BODY.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.parse.outputs.tag }}
          name: ${{ steps.parse.outputs.name && format('{0} v{1}', steps.parse.outputs.name, steps.parse.outputs.version) || format('v{0}', steps.parse.outputs.version) }}
          body_path: RELEASE_BODY.md
          generate_release_notes: false
