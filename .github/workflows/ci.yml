name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: build-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Locate Visual Studio AppxPackage tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsInstallPath) {
            throw "Could not locate a Visual Studio installation with MSBuild."
          }

          $appxToolsPath = Join-Path $vsInstallPath 'MSBuild\Microsoft\VisualStudio\v17.0\AppxPackage'
          if (-not (Test-Path $appxToolsPath)) {
            throw "AppxPackage tools not found at $appxToolsPath."
          }

          "AppxMSBuildToolsPath=$appxToolsPath\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using AppxPackage tools from $appxToolsPath"

      # SDK 9's slnx metaproj generator rejects -p:Platform=x64/arm64 with
      # MSB4126 ("solution configuration is invalid") even though the slnx
      # declares those configs. csproj-direct invocations don't go through
      # the metaproj path and accept -p:Platform cleanly. So:
      #   - Restore at slnx level (no -p:Platform) — pulls platform-agnostic
      #     NuGet assets for every project in the solution at once.
      #   - Build + Test invoke each csproj directly with -p:Platform so the
      #     matrix actually exercises x64 and arm64 code paths instead of
      #     defaulting to slnx's first config.
      - name: Restore
        run: dotnet restore FieldCure.AssistStudio.slnx

      - name: Build (AssistStudio app + transitive deps)
        run: dotnet build src/AssistStudio/AssistStudio.csproj --no-restore --configuration Release -p:Platform=${{ matrix.arch }} -p:PublishProfile= -p:PublishReadyToRun=false

      - name: Test
        shell: pwsh
        run: |
          $tests = @(
            'tests/Ai.Execution.Tests/Ai.Execution.Tests.csproj',
            'tests/Ai.Providers.Tests/Ai.Providers.Tests.csproj',
            'tests/AssistStudio.App.Tests/AssistStudio.App.Tests.csproj',
            'tests/AssistStudio.Anthropic.Tests/AssistStudio.Anthropic.Tests.csproj',
            'tests/AssistStudio.Core.Tests/AssistStudio.Core.Tests.csproj'
          )
          foreach ($t in $tests) {
            Write-Host "=== $t ==="
            dotnet test $t --configuration Release -p:Platform=${{ matrix.arch }} --verbosity normal
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
