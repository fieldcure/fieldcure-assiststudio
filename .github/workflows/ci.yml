name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/AssistStudio.Core/AssistStudio.Core.csproj

      - name: Build
        run: dotnet build src/AssistStudio.Core/AssistStudio.Core.csproj --no-restore

      - name: Test
        run: dotnet test src/AssistStudio.Core.Tests/AssistStudio.Core.Tests.csproj --verbosity normal
