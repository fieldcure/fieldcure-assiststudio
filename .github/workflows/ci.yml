name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: build-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      # Local dev pins SDK 10 preview via global.json, but the hosted runners
      # ship SDK 10.0.201 as the highest installed and lack the matching VS 18
      # AppxPackage tooling, so WindowsAppSDK's MrtCore.PriGen fails. Rewrite
      # global.json to pin SDK 9 for CI only. Same fix applies to both x64 and
      # ARM64 runners.
      - name: Pin SDK to 9.0 for CI
        shell: pwsh
        run: |
          '{ "sdk": { "version": "9.0.100", "rollForward": "latestFeature" } }' |
            Set-Content -Path global.json -Encoding utf8
          dotnet --version

      - name: Locate Visual Studio AppxPackage tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsInstallPath) {
            throw "Could not locate a Visual Studio installation with MSBuild."
          }

          $appxToolsPath = Join-Path $vsInstallPath 'MSBuild\Microsoft\VisualStudio\v17.0\AppxPackage'
          if (-not (Test-Path $appxToolsPath)) {
            throw "AppxPackage tools not found at $appxToolsPath."
          }

          "AppxMSBuildToolsPath=$appxToolsPath\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using AppxPackage tools from $appxToolsPath"

      - name: Restore
        run: dotnet restore FieldCure.AssistStudio.slnx -p:Platform=${{ matrix.arch }}

      - name: Build
        run: dotnet build FieldCure.AssistStudio.slnx --no-restore --configuration Release -p:Platform=${{ matrix.arch }} -p:PublishProfile= -p:PublishReadyToRun=false

      - name: Test
        run: dotnet test FieldCure.AssistStudio.slnx --no-build --configuration Release -p:Platform=${{ matrix.arch }} --verbosity normal
